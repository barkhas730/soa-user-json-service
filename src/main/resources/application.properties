spring.application.name=user-json-service
server.port=${SERVER_PORT:8082}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/profiledb}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

soap.service.url=${SOAP_SERVICE_URL:http://localhost:8081/ws}
file.manager.url=${FILE_MANAGER_URL:http://localhost:8083/files}
